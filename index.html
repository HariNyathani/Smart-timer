<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Timer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="theme-toggle" id="themeToggle" aria-label="Toggle theme" role="button" tabindex="0">
    <div class="toggle-circle" id="toggleCircle">🌙</div>
  </div>

  <main class="container">
    <h1 class="title">Timer</h1>

    <section class="card">
      <p class="label">Time:</p>

      <div class="inputs">
        <div class="input-group">
          <label for="hours">Hours</label>
          <input type="number" id="hours" min="0" placeholder="0" />
        </div>

        <div class="input-group">
          <label for="minutes">Minutes</label>
          <input type="number" id="minutes" min="0" placeholder="0" />
        </div>

        <div class="input-group">
          <label for="seconds">Seconds</label>
          <input type="number" id="seconds" min="0" placeholder="0" />
        </div>
      </div>

      <div class="presets">
        <button type="button" onclick="setPreset(60)">1 min</button>
        <button type="button" onclick="setPreset(120)">2 min</button>
        <button type="button" onclick="setPreset(300)">5 min</button>
      </div>

      <div class="sound-row">
        <label for="soundSelect">Sound</label>
        <select id="soundSelect">
          <option value="loud">Loud</option>
          <option value="timer">Timer Beep</option>
          <option value="normal">Normal</option>
          <option value="soft1">Soft 1</option>
          <option value="soft2">Soft 2</option>
        </select>
      </div>

      <div class="sound-row">
        <label for="volumeControl">Volume</label>
        <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
      </div>

      <button id="startBtn" type="button">Start Timer</button>
    </section>
  </main>

  <div id="popup" class="popup hidden">
    <div class="popup-header" style="justify-content: flex-end;">
      <button id="closePopup" type="button" aria-label="Close">✕</button>
    </div>

    <div id="timeDisplay">00:00:00</div>

    <div class="popup-controls">
      <button id="pauseBtn" type="button" aria-label="Pause">⏸</button>
      <button id="restartBtn" type="button" aria-label="Restart">↻</button>
    </div>

    <div class="resize-hint">Drag from corner to resize</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
